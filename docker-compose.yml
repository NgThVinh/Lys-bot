services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-lys-bot}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npx nodemon src/index.js
    networks:
      - bot-network

  watchtower:
    image: containrrr/watchtower
    environment:
      - DOCKER_API_VERSION=1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup

networks:
  bot-network:
    name: ${PROJECT_NAME:-lys-bot}-net
    driver: bridge
