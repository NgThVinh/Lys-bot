services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lys-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./database.yml:/app/database.yml:ro
    networks:
      - bot-network

networks:
  bot-network:
    name: lys-bot-net
    driver: bridge
