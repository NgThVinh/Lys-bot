services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-lys-bot}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/database.yml
    networks:
      - bot-network

networks:
  bot-network:
    name: ${PROJECT_NAME:-lys-bot}-net
    driver: bridge

volumes:
  bot-data:
